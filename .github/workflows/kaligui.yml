name: Kali Linux Desktop (bore.pub)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  kali-vps:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    container:
      image: kalilinux/kali-rolling
      options: --privileged

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update & install essential tools
        run: |
          apt-get update
          apt-get install -y sudo wget curl ca-certificates openssh-server neofetch fastfetch

      - name: Install XFCE desktop + top tools (ringan)
        run: |
          echo "Menginstall desktop XFCE (ringan) + tools populer..."
          apt-get install -y kali-desktop-xfce kali-tools-top10 xfce4-terminal firefox-esr
          apt-get clean
          echo "✅ Desktop terinstall"

      - name: Show system info (fastfetch, fallback neofetch)
        run: |
          if command -v fastfetch &> /dev/null; then
            fastfetch --stdout || neofetch --stdout || echo "fastfetch/neofetch tidak bisa dijalankan"
          else
            neofetch --stdout
          fi

      - name: Change root password to "redz"
        run: |
          echo "root:redz" | chpasswd
          echo "✅ Password root diubah"

      - name: Configure & start SSH server
        run: |
          ssh-keygen -A
          echo "PermitRootLogin yes" >> /etc/ssh/sshd_config
          echo "PasswordAuthentication yes" >> /etc/ssh/sshd_config
          /usr/sbin/sshd
          echo "✅ SSH server berjalan"

      - name: Install bore (tunnel)
        run: |
          curl -fsSL https://github.com/ekzhang/bore/releases/download/v0.5.2/bore-v0.5.2-x86_64-unknown-linux-musl.tar.gz -o bore.tar.gz
          tar xzf bore.tar.gz
          mv bore /usr/local/bin/bore
          chmod +x /usr/local/bin/bore

      - name: Expose SSH port via bore.pub & keep alive
        run: |
          nohup bore local 22 --to bore.pub > /tmp/bore.log 2>&1 &
          BORE_PID=$!
          sleep 8
          REMOTE_ADDR=$(grep -oP 'listening at \K[^ ]+' /tmp/bore.log | tail -1)
          if [ -z "$REMOTE_ADDR" ]; then
            sleep 10
            REMOTE_ADDR=$(grep -oP 'listening at \K[^ ]+' /tmp/bore.log | tail -1)
          fi
          if [ -z "$REMOTE_ADDR" ]; then
            echo "❌ Gagal mendapatkan alamat remote"
            cat /tmp/bore.log
            exit 1
          fi
          echo "========================================="
          echo "   KALI LINUX DESKTOP - SIAP DIGUNAKAN"
          echo "========================================="
          echo " Remote address : ${REMOTE_ADDR}"
          echo " SSH command    : ssh root@${REMOTE_ADDR}"
          echo " Password root  : redz"
          echo "========================================="
          echo " Untuk GUI: gunakan X11 forwarding"
          echo "   ssh -X root@${REMOTE_ADDR}"
          echo "========================================="
          echo " VPS aktif hingga workflow timeout (6 jam)"
          echo "========================================="
          # Simpan info
          echo "REMOTE_ADDR=${REMOTE_ADDR}" >> $GITHUB_ENV
          echo "BORE_PID=${BORE_PID}" >> $GITHUB_ENV
          # Keep alive
          while true; do
            if ! kill -0 $BORE_PID 2>/dev/null; then
              echo "❌ Bore berhenti"
              cat /tmp/bore.log
              exit 1
            fi
            sleep 60
          done
